<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Sign in — Acme</title>
</head>
<body>
  <header class="site-header">
    <a class="logo" href="/">Acme</a>
    <nav class="top-nav">
      <a href="/docs">Docs</a>
      <a href="/api">API</a>
      <a href="/blog">Blog</a>
      <a href="/pricing">Pricing</a>
    </nav>
  </header>

  <main class="auth">
    <form class="login-form" action="/login" method="post">
      <h1>Sign in</h1>
      <label>Email<input type="email" name="email" placeholder="you@example.com" /></label>
      <label>Password<input type="password" name="password" placeholder="••••••••" /></label>
      <button type="submit">Sign in</button>
      <a href="/reset">Forgot password?</a>
    </form>
    <p class="signup-prompt">New here? <a href="/signup">Create an account</a>.</p>
  </main>

  <footer class="site-footer">
    <nav class="footer-nav">
      <a href="/about">About</a>
      <a href="/jobs">Jobs</a>
      <a href="/privacy">Privacy</a>
    </nav>
    <p class="copyright">© 2026 Acme Corporation. All rights reserved.</p>
  </footer>
</body>
</html>
