<script src="board-state.js"></script>
<script>
  // page-specific: hand-rolled graph wires + hover-trace (no lib)
  const root = document.documentElement, canvas = document.getElementById('canvas'), svg = document.getElementById('wires');
  const edges = [['epic-substrate-cli','epic-substrate-board','satisfied'],['board-host','board-shell','unmet'],['board-shell','board-kanban','unmet'],['board-shell','board-dependency','unmet'],['board-shell','board-table','unmet']];
  const C = id => { const n = document.querySelector(`.gnode[data-id="${id}"]`), nr = n.getBoundingClientRect(), cr = canvas.getBoundingClientRect(); return { x: nr.left+nr.width/2-cr.left, y: nr.top+nr.height/2-cr.top, w: nr.width }; };
  function draw(){ const col = getComputedStyle(root), ready = col.getPropertyValue('--status-ready').trim(), blocked = col.getPropertyValue('--status-blocked').trim(); svg.innerHTML='';
    for (const [a,b,k] of edges){ const A=C(a),B=C(b),x1=A.x+A.w/2,y1=A.y,x2=B.x-B.w/2,y2=B.y,mx=(x1+x2)/2; const p=document.createElementNS('http://www.w3.org/2000/svg','path'); p.setAttribute('d',`M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`); p.setAttribute('fill','none'); p.setAttribute('stroke', k==='unmet'?blocked:ready); p.setAttribute('stroke-width','2'); p.setAttribute('opacity','.8'); if(k==='unmet')p.setAttribute('stroke-dasharray','5 4'); p.dataset.a=a; p.dataset.b=b; svg.appendChild(p); } }
  draw(); addEventListener('resize', draw);
  document.getElementById('accent').addEventListener('change', () => setTimeout(draw,40));
  document.querySelectorAll('#mode .seg-btn').forEach(b => b.addEventListener('click', () => setTimeout(draw,40)));
  document.querySelectorAll('.gnode').forEach(n => {
    n.addEventListener('mouseenter', () => { const id=n.dataset.id; canvas.classList.add('focusing'); n.classList.add('hot'); svg.querySelectorAll('path').forEach(p=>{ if(p.dataset.a===id||p.dataset.b===id){ p.classList.add('hot'); p.setAttribute('stroke-width','3'); const o=p.dataset.a===id?p.dataset.b:p.dataset.a; document.querySelector(`.gnode[data-id="${o}"]`)?.classList.add('hot'); } }); });
    n.addEventListener('mouseleave', () => { canvas.classList.remove('focusing'); document.querySelectorAll('.gnode.hot').forEach(x=>x.classList.remove('hot')); svg.querySelectorAll('path').forEach(p=>{ p.classList.remove('hot'); p.setAttribute('stroke-width','2'); }); });
  });
</script>
