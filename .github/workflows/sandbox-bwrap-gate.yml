name: Sandbox bwrap gate

on:
  pull_request:
    paths:
      - "plugins/pi-sandbox/**"
      - "plugins/background-tasks/**"
      - ".github/workflows/sandbox-bwrap-gate.yml"
  push:
    branches: [ main, "feat/**" ]
    paths:
      - "plugins/pi-sandbox/**"
      - "plugins/background-tasks/**"
      - ".github/workflows/sandbox-bwrap-gate.yml"
    tags: [ "v*" ]
  release:
    types: [ created, published ]
  workflow_dispatch:

jobs:
  bwrap-gate:
    name: Real bwrap integration gate
    runs-on: ubuntu-latest
    env:
      PI_SANDBOX_REQUIRE_BWRAP: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install bubblewrap
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap

      - name: Allow unprivileged user namespaces for bwrap
        run: |
          # ubuntu-latest is now 24.04, which sets
          # kernel.apparmor_restrict_unprivileged_userns=1 by default. The apt
          # bubblewrap package is non-setuid, so it needs an unprivileged user
          # namespace to create the pid/net namespaces (--unshare-pid/--unshare-net).
          # AppArmor blocks that, and every real-bwrap integration test fails at
          # namespace creation (2-8ms) even though `bwrap --version` passes. This is
          # the same gate openai/codex-action#77 (2026-03) and anthropics/claude-code#55585
          # (2026-05) clear. It is an environment fix, not a bwrap-arg change: no
          # bwrap flag can bypass a kernel userns restriction.
          #
          # Guard on file existence, NOT writability: the runner user is non-root,
          # so [ -w /proc/sys/... ] is always false and the sudo tee never ran —
          # which is why the namespace smoke step below failed with
          # "setting up uid map: Permission denied". sudo can write it; the test
          # must not short-circuit before sudo gets the chance.
          if [ -f /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
            echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns
          fi
          # Some runners also gate the legacy clone knob.
          if [ -f /proc/sys/kernel/unprivileged_userns_clone ]; then
            echo 1 | sudo tee /proc/sys/kernel/unprivileged_userns_clone
          fi

      - name: Verify bubblewrap executes
        run: bwrap --version

      - name: Verify bwrap can actually create a namespace
        run: |
          # Match the real buildBwrapArgs shape: --ro-bind / / and --dev /dev
          # must precede --unshare-pid so /bin/sh is reachable inside the new
          # root. A bare `bwrap --unshare-pid --proc /proc ... /bin/sh` fails
          # with "execvp /bin/sh: No such file or directory" because the root
          # filesystem isn't mounted.
          bwrap --ro-bind / / --dev /dev --unshare-pid --proc /proc --die-with-parent /bin/sh -c 'echo bwrap-namespace-ok'
          echo "bwrap namespace creation confirmed"

      - name: Run pi-sandbox tests with bwrap required
        run: |
          cd plugins/pi-sandbox
          bun test

      - name: Run background-tasks tests with bwrap required
        run: |
          cd plugins/background-tasks
          bun test
